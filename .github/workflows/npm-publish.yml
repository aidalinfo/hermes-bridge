name: NPM Publish

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@aidalinfo'

      - name: Get package version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "Package: $PACKAGE_NAME@$VERSION"

      - name: Check if version exists on NPM
        id: npm-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm view ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.package.outputs.version }} already exists on NPM — skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.package.outputs.version }} does not exist on NPM"
          fi

      - name: Install dependencies
        if: steps.npm-check.outputs.exists == 'false'
        run: npm ci

      - name: Build package
        if: steps.npm-check.outputs.exists == 'false'
        run: npm run build

      - name: Run tests
        if: steps.npm-check.outputs.exists == 'false'
        run: npm test

      - name: Publish to NPM
        if: steps.npm-check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release
        if: steps.npm-check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: hermes-bridge - Release v${{ steps.package.outputs.version }}
          body: |
            ## Changes

            `${{ steps.package.outputs.name }}` has been updated to version ${{ steps.package.outputs.version }}.

            ```bash
            npx ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} install --token=<token> --relay-url=wss://<host>/bridge/connect
            ```
          draft: false
          prerelease: false
